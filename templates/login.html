<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AGRO-LINK BATANG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1332&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            border: none;
        }
        .login-header {
            background: #2e7d32;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .btn-success {
            background-color: #2e7d32;
            border: none;
            padding: 10px;
        }
        .btn-success:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card">
                <div class="login-header text-center">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Agro-Link" style="width: 90px; margin-bottom: 15px; border-radius: 10px; background-color: white; padding: 5px;">
                    <h2 class="fw-bold mb-0">AGRO-LINK</h2>
                    <p class="mb-0">Kabupaten Batang</p>
                </div>
                <div class="card-body p-4">
                    <h5 class="text-center mb-4">Silakan Login</h5>
                    
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-person-badge"></i> NIK</label>
                            <input type="text" name="nik" class="form-control" placeholder="Masukkan NIK" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                            <input type="password" name="password" class="form-control" placeholder="********" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mb-3">
                            Masuk Ke Sistem <i class="bi bi-arrow-right-circle ms-2"></i>
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <p class="small text-muted mb-0">Belum punya akun? <a href="/register" class="text-success text-decoration-none fw-bold">Daftar Sekarang</a></p>
                    </div>
                </div>
            </div>
            <p class="text-center text-white mt-4 small">© 2026 KRENOVA - Inovasi Ketahanan Pangan Batang</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
