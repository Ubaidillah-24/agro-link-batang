<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - AGRO-LINK BATANG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?ixlib=rb-4.0.3&auto=format&fit=crop&w=1170&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card register-card p-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Agro-Link" style="width: 80px; margin-bottom: 15px; border-radius: 10px; background-color: white; padding: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                    <h2 class="fw-bold text-success">Gabung AGRO-LINK</h2>
                    <p class="text-muted">Mulai digitalkan hasil panen Kabupaten Batang</p>
                </div>

                <form action="/register" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">NIK (Sesuai KTP)</label>
                            <input type="text" name="nik" class="form-control" placeholder="16 digit NIK" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" name="nama_lengkap" class="form-control" placeholder="Nama tanpa gelar" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Buat password aman" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Saya Adalah...</label>
                        <select name="role" class="form-select" required>
                            <option value="petani">Petani (Penjual Hasil Bumi)</option>
                            <option value="pedagang">Pedagang Pasar (Pembeli)</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">No. WhatsApp</label>
                            <input type="text" name="no_hp" class="form-control" placeholder="08xxxxxxxxxx" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Domisili Kecamatan</label>
                            <select name="kecamatan" class="form-select" required>
                                <option value="Batang">Batang</option>
                                <option value="Bawang">Bawang</option>
                                <option value="Blado">Blado</option>
                                <option value="Bandar">Bandar</option>
                                <option value="Limpung">Limpung</option>
                                <option value="Reban">Reban</option>
                                <option value="Tersono">Tersono</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">
                        Daftar Akun Sekarang
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0">Sudah punya akun? <a href="/login" class="text-success fw-bold text-decoration-none">Login di sini</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
