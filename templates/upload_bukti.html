<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Bukti Pembayaran - AGRO-LINK BATANG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-custom { background-color: #2e7d32; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-icon { font-size: 3rem; color: #198754; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-5">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/dashboard_pedagang">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" width="35" height="35" class="d-inline-block align-text-top me-2 bg-white rounded-circle p-1">
            AGRO-LINK <span class="fw-light ms-1">Pedagang Pasar</span>
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-custom overflow-hidden">
                <div class="bg-success text-white text-center py-3">
                    <h4 class="fw-bold mb-0"><i class="bi bi-receipt me-2"></i> Konfirmasi Pembayaran</h4>
                </div>
                
                <div class="card-body p-4 text-center">
                    
                    <i class="bi bi-cloud-arrow-up upload-icon mb-3 d-block"></i>
                    
                    <div class="alert alert-light border-success border-opacity-25 shadow-sm mb-4 text-start">
                        <p class="mb-0 text-muted"><i class="bi bi-info-circle-fill text-success me-2"></i> Silakan upload foto struk transfer Anda agar Bapak/Ibu Petani bisa segera memvalidasi dan mengemas pesanan Anda.</p>
                    </div>

                    <form action="/proses_upload_bukti" method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="id_pesanan" value="{{ id_pesanan }}">
                        <label>Pilih File Struk:</label>
                        <input type="file" name="file_bukti" required>
                        <button type="submit" class="btn btn-success">Upload Bukti Bayar</button>
                    </form>

                </div>
            </div>
            <p class="text-center text-muted mt-4 small"><i class="bi bi-shield-lock-fill text-success"></i> Data transaksi dienkripsi dan aman dalam sistem AGRO-LINK.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
